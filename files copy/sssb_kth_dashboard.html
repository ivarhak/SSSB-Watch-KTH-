<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SSSB → KTH Commute Board</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-950:#0a1726;
    --navy-900:#0e1f34;
    --navy-800:#152a44;
    --navy-700:#1e3a5c;
    --navy-600:#2a4d78;
    --paper:#e9edf1;
    --paper-dim:#9fb0c2;
    --line-north:#4C9FE8;
    --line-south:#E0596B;
    --line-city:#3FBF8F;
    --amber:#E8A33D;
    --red-flag:#E0596B;
    --empty-gray:#64748B;
    --display: 'Space Grotesk', system-ui, sans-serif;
    --mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--navy-950);
    color:var(--paper);
    font-family:var(--display);
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  /* ── Top bar ─────────────────────────────────────────── */
  header{
    display:flex;
    align-items:center;
    gap:20px;
    padding:14px 22px;
    background:linear-gradient(180deg, var(--navy-900), var(--navy-950));
    border-bottom:1px solid var(--navy-700);
    flex-wrap:wrap;
    z-index:10;
  }
  .brand{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-right:auto;
  }
  .brand .dot{
    width:10px;height:10px;border-radius:50%;
    background:var(--line-city);
    box-shadow:0 0 8px var(--line-city);
    display:inline-block;
  }
  .brand h1{
    font-size:18px;
    font-weight:700;
    letter-spacing:0.02em;
    margin:0;
  }
  .brand .sub{
    font-family:var(--mono);
    font-size:11px;
    color:var(--paper-dim);
    letter-spacing:0.04em;
  }

  .control{
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .control label{
    font-family:var(--mono);
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--paper-dim);
  }
  .slider-row{display:flex;align-items:center;gap:8px;}
  .slider-row span{font-family:var(--mono);font-size:12px;min-width:52px;}
  input[type=range]{width:140px;accent-color:var(--line-north);}

  .legend{display:flex;gap:10px;}
  .legend button{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.03em;
    color:var(--paper);
    background:var(--navy-800);
    border:1px solid var(--navy-600);
    border-radius:999px;
    padding:6px 12px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
    transition:opacity .15s, border-color .15s;
  }
  .legend button .sw{width:8px;height:8px;border-radius:50%;}
  .legend button.off{opacity:0.35;}
  .legend button[data-g="North"] .sw{background:var(--line-north);}
  .legend button[data-g="South"] .sw{background:var(--line-south);}
  .legend button[data-g="City"] .sw{background:var(--line-city);}

  #browseAllBtn{
    font-family:var(--mono);
    font-size:12px;
    font-weight:600;
    letter-spacing:0.04em;
    color:var(--paper);
    background:var(--navy-800);
    border:1px solid var(--navy-600);
    border-radius:8px;
    padding:10px 16px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    transition:background .15s, border-color .15s;
  }
  #browseAllBtn:hover{border-color:var(--line-north);}
  #browseAllBtn.active{background:var(--line-north);color:var(--navy-950);border-color:var(--line-north);}

  #refreshBtn{
    font-family:var(--mono);
    font-size:12px;
    font-weight:600;
    letter-spacing:0.04em;
    color:var(--navy-950);
    background:var(--line-north);
    border:none;
    border-radius:8px;
    padding:10px 16px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    transition:transform .1s, background .15s;
  }
  #refreshBtn:hover{background:#6bb3ee;}
  #refreshBtn:active{transform:scale(0.97);}
  #refreshBtn.spinning svg{animation:spin 0.9s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  #meta{
    font-family:var(--mono);
    font-size:10.5px;
    color:var(--paper-dim);
    text-align:right;
    line-height:1.5;
  }

  /* ── Main layout ─────────────────────────────────────── */
  main{
    flex:1;
    display:flex;
    min-height:0;
  }
  #map{
    flex:1;
    /* CartoDB Voyager tiles: cream/beige land, blue water, high-contrast
       roads and labels — much easier to actually read the city than the
       dark tile sets, and it reads fine against the dark header/sidebar
       without needing to force the map itself into the navy palette. */
    filter:saturate(1.25) contrast(1.05) sepia(0.12);
  }
  .leaflet-container{background:var(--navy-950);}

  #sidebar{
    width:380px;
    flex-shrink:0;
    background:var(--navy-900);
    border-left:1px solid var(--navy-700);
    overflow-y:auto;
    padding:0 0 40px 0;
  }
  #sidebar::-webkit-scrollbar{width:6px;}
  #sidebar::-webkit-scrollbar-thumb{background:var(--navy-600);border-radius:3px;}

  .panel-header{
    position:sticky;top:0;
    background:var(--navy-900);
    padding:16px 18px 10px;
    border-bottom:1px solid var(--navy-700);
    z-index:5;
  }
  .panel-header h2{margin:0;font-size:15px;font-weight:600;}
  .panel-header .back{
    font-family:var(--mono);
    font-size:11px;
    color:var(--line-north);
    cursor:pointer;
    background:none;border:none;padding:0 0 8px;
  }
  .panel-header .stats-row{
    display:flex;gap:10px;margin-top:10px;
  }
  .gauge{
    flex:1;
    background:var(--navy-800);
    border:1px solid var(--navy-700);
    border-radius:10px;
    padding:9px 10px;
  }
  .gauge .g-label{font-family:var(--mono);font-size:9px;color:var(--paper-dim);text-transform:uppercase;letter-spacing:.06em;}
  .gauge .g-value{font-family:var(--mono);font-size:19px;font-weight:600;margin-top:2px;}
  .gauge .g-value small{font-size:11px;font-weight:400;color:var(--paper-dim);}

  #listings{padding:8px 14px;}
  .listing-row{
    background:var(--navy-800);
    border:1px solid var(--navy-700);
    border-radius:10px;
    padding:11px 13px;
    margin-bottom:8px;
    cursor:pointer;
    transition:border-color .15s;
    position:relative;
  }
  .listing-row:hover{border-color:var(--navy-600);}
  .listing-row .row-top{
    display:flex;justify-content:space-between;align-items:center;gap:8px;
  }
  .listing-row .area-name{font-weight:600;font-size:13px;}
  .listing-row .queue-badge{
    font-family:var(--mono);
    font-size:12px;font-weight:600;
    padding:3px 8px;border-radius:6px;
    background:var(--navy-700);
  }
  .listing-row .details{
    font-family:var(--mono);font-size:11px;color:var(--paper-dim);margin-top:5px;
  }
  .new-tag{
    position:absolute;top:-7px;right:10px;
    font-family:var(--mono);font-size:9px;font-weight:600;
    background:var(--amber);color:var(--navy-950);
    padding:2px 6px;border-radius:5px;letter-spacing:.05em;
  }
  .search-input{
    width:100%;
    font-family:var(--mono);
    font-size:12.5px;
    color:var(--paper);
    background:var(--navy-800);
    border:1px solid var(--navy-700);
    border-radius:8px;
    padding:9px 11px;
    margin-top:10px;
    outline:none;
  }
  .search-input:focus{border-color:var(--line-north);}
  .search-input::placeholder{color:var(--paper-dim);}

  .empty-state{
    padding:30px 20px;text-align:center;color:var(--paper-dim);
    font-family:var(--mono);font-size:12px;line-height:1.6;
  }

  #banner{
    display:none;
    font-family:var(--mono);
    font-size:11.5px;
    background:var(--amber);
    color:var(--navy-950);
    padding:8px 22px;
    text-align:center;
    letter-spacing:0.02em;
  }

  .kth-pulse{
    width:16px;height:16px;border-radius:50%;
    background:var(--amber);
    box-shadow:0 0 0 rgba(232,163,61,0.6);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(232,163,61,0.55);}
    70%{box-shadow:0 0 0 14px rgba(232,163,61,0);}
    100%{box-shadow:0 0 0 0 rgba(232,163,61,0);}
  }
  .area-roundel{
    border-radius:50%;
    border:2px solid var(--navy-950);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);
  }
</style>
</head>
<body>

<div id="banner"></div>

<header>
  <div class="brand">
    <span class="dot"></span>
    <div>
      <h1>SSSB → KTH Commute Board</h1>
      <div class="sub">student housing, sorted by queue days</div>
    </div>
  </div>

  <div class="control">
    <label>Max commute</label>
    <div class="slider-row">
      <input type="range" id="maxCommute" min="5" max="90" value="45" step="5">
      <span id="maxCommuteLabel">45 min</span>
    </div>
  </div>

  <div class="control">
    <label>Lines</label>
    <div class="legend" id="legend">
      <button data-g="North"><span class="sw"></span>North</button>
      <button data-g="South"><span class="sw"></span>South</button>
      <button data-g="City"><span class="sw"></span>City</button>
    </div>
  </div>

  <button id="browseAllBtn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="11" cy="11" r="7" stroke-linecap="round"/>
      <path d="M21 21l-4.35-4.35" stroke-linecap="round"/>
    </svg>
    All listings
  </button>

  <button id="refreshBtn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M21 12a9 9 0 1 1-2.64-6.36" stroke-linecap="round"/>
      <path d="M21 3v6h-6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Refresh listings
  </button>

  <div id="meta">
    <div id="lastUpdated">—</div>
    <div id="listingCount">—</div>
    <div id="autoStatus" style="color:var(--line-city);"></div>
  </div>
</header>

<main>
  <div id="map"></div>
  <div id="sidebar">
    <div class="panel-header" id="panelHeader">
      <h2 id="panelTitle">All available listings</h2>
    </div>
    <div id="listings"></div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const KTH = [59.3467, 18.0716];
const LINE_COLORS = { North: '#4C9FE8', South: '#E0596B', City: '#3FBF8F' };
const activeGroups = new Set(['North','South','City']);
let maxCommuteMin = 45;
let currentData = null;
let selectedArea = null;
let markers = {};
let routeLine = null;
let browseAll = false;
let searchQuery = '';

// ---- demo data, shown only if the local server (sssb_kth_monitor.py --serve) isn't running ----
const DEMO_DATA = {
  demo: true,
  generated_at: new Date().toISOString(),
  areas: {
    "Roslagstull": { group:"City", coords:[59.3540,18.0468], straight_line:{distance_km:0.9,bike_min:7,walk_min:11}, transit_min:9 },
    "Jerum":        { group:"City", coords:[59.3502,18.0530], straight_line:{distance_km:0.7,bike_min:6,walk_min:9},  transit_min:8 },
    "Lappkärrsberget": { group:"North", coords:[59.3697,18.0448], straight_line:{distance_km:2.8,bike_min:14,walk_min:34}, transit_min:16 },
    "Kungshamra":   { group:"North", coords:[59.3655,18.0331], straight_line:{distance_km:3.4,bike_min:17,walk_min:41}, transit_min:19 },
    "Tanto":        { group:"City", coords:[59.3141,18.0472], straight_line:{distance_km:3.9,bike_min:19,walk_min:47}, transit_min:24 },
    "Skärmarbrink": { group:"South", coords:[59.2975,18.0975], straight_line:{distance_km:5.7,bike_min:26,walk_min:68}, transit_min:29 },
    "Flemingsberg": { group:"South", coords:[59.2167,17.9500], straight_line:{distance_km:15.1,bike_min:64,walk_min:181}, transit_min:47 },
  },
  listings: [
    { id:"d1", area:"Jerum", queue_days:410, rent_sek:5200, size_sqm:19, url:null },
    { id:"d2", area:"Roslagstull", queue_days:875, rent_sek:6100, size_sqm:24, url:null },
    { id:"d3", area:"Lappkärrsberget", queue_days:1230, rent_sek:5600, size_sqm:20, url:null },
    { id:"d4", area:"Tanto", queue_days:1990, rent_sek:7400, size_sqm:32, url:null },
    { id:"d5", area:"Kungshamra", queue_days:640, rent_sek:5900, size_sqm:22, url:null },
  ],
  new_listing_ids: ["d1"]
};

function showBanner(text){
  const b = document.getElementById('banner');
  b.textContent = text;
  b.style.display = 'block';
}

async function loadData(triggerRefresh){
  const btn = document.getElementById('refreshBtn');
  if (triggerRefresh) btn.classList.add('spinning');
  try {
    const url = triggerRefresh ? '/api/refresh' : '/api/listings';
    const res = await fetch(url, { method: triggerRefresh ? 'POST' : 'GET' });
    if (!res.ok) throw new Error('bad response');
    currentData = await res.json();
  } catch (e) {
    currentData = DEMO_DATA;
    showBanner('Showing example data — start the local server (python sssb_kth_monitor.py --serve) and open http://localhost:5055 for live listings.');
  }
  btn.classList.remove('spinning');
  render();
}

function commuteMinutes(area){
  if (!area) return Infinity;
  if (typeof area.transit_min === 'number') return area.transit_min;
  if (area.straight_line) return area.straight_line.bike_min;
  return Infinity;
}

function render(){
  renderMeta();
  renderMap();
  renderSidebar();
}

function renderMeta(){
  const d = currentData;
  document.getElementById('lastUpdated').textContent =
    'updated ' + new Date(d.generated_at).toLocaleString([], {hour:'2-digit', minute:'2-digit', month:'short', day:'numeric'});
  document.getElementById('listingCount').textContent =
    d.listings.length + ' listings across ' + Object.keys(d.areas).length + ' areas';
  document.getElementById('autoStatus').textContent = d.demo
    ? ''
    : (d.poll_interval_min ? `● auto-checking every ${d.poll_interval_min}min` : '');
}

function visibleAreaNames(){
  return Object.entries(currentData.areas)
    .filter(([name, a]) => activeGroups.has(a.group) && commuteMinutes(a) <= maxCommuteMin)
    .map(([name]) => name);
}

let leafletMap;
function initMap(){
  leafletMap = L.map('map', { zoomControl:true, attributionControl:false }).setView(KTH, 12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    maxZoom: 18
  }).addTo(leafletMap);

  const kthIcon = L.divIcon({ className:'', html:'<div class="kth-pulse"></div>', iconSize:[16,16] });
  L.marker(KTH, { icon: kthIcon }).addTo(leafletMap).bindTooltip('KTH', {permanent:false, direction:'top'});
}

function renderMap(){
  Object.values(markers).forEach(m => leafletMap.removeLayer(m));
  markers = {};
  const visible = new Set(visibleAreaNames());

  Object.entries(currentData.areas).forEach(([name, area]) => {
    if (!area.coords) return;
    const isVisible = visible.has(name);
    const count = currentData.listings.filter(l => l.area === name).length;
    const isEmpty = count === 0;
    const color = isEmpty ? 'var(--empty-gray)' : (LINE_COLORS[area.group] || '#888');
    const size = isEmpty ? 16 : 14 + Math.min(count, 6) * 3;

    const icon = L.divIcon({
      className:'',
      html:`<div class="area-roundel" style="width:${size}px;height:${size}px;background:${isVisible?color:'#334'};color:${isEmpty?'#fff':'#0a1726'};font-size:${isEmpty?11:10}px;font-weight:700;opacity:${isVisible?1:0.35}">${isEmpty ? '×' : count}</div>`,
      iconSize:[size,size],
    });
    const marker = L.marker(area.coords, { icon }).addTo(leafletMap);
    marker.on('click', () => selectArea(name));
    if (count > 0) {
      marker.bindTooltip(`${name} · ${count} available`, { direction:'top' });
    } else {
      marker.bindTooltip(`${name} · none available`, { direction:'top', opacity:0.7 });
    }
    markers[name] = marker;
  });
}

function selectArea(name){
  selectedArea = name;
  const area = currentData.areas[name];
  if (routeLine) leafletMap.removeLayer(routeLine);
  if (area && area.coords) {
    routeLine = L.polyline([area.coords, KTH], {
      color: LINE_COLORS[area.group] || '#fff', weight:2, dashArray:'4 6', opacity:0.8
    }).addTo(leafletMap);
    leafletMap.flyTo(area.coords, 13, { duration:0.6 });
  }
  renderSidebar();
}

function clearSelection(){
  selectedArea = null;
  if (routeLine) { leafletMap.removeLayer(routeLine); routeLine = null; }
  renderSidebar();
}

function fmtCommute(area){
  const parts = [];
  if (area.straight_line) {
    parts.push(`<div class="gauge"><div class="g-label">Straight-line</div><div class="g-value">${area.straight_line.distance_km}<small> km · ~${area.straight_line.bike_min}min bike</small></div></div>`);
  }
  parts.push(`<div class="gauge"><div class="g-label">Transit (real)</div><div class="g-value">${typeof area.transit_min === 'number' ? area.transit_min + '<small> min</small>' : '<small>no API key set</small>'}</div></div>`);
  return parts.join('');
}

function rowHtml(l, newIds){
  const area = currentData.areas[l.area] || {};
  const qd = l.queue_days != null ? l.queue_days.toLocaleString() + ' days' : '— days';
  const commute = typeof area.transit_min === 'number' ? area.transit_min + ' min transit' : (area.straight_line ? '~' + area.straight_line.bike_min + ' min bike' : '');
  return `
    <div class="listing-row" onclick="handleRowClick('${l.id.replace(/'/g,"\\'")}')">
      ${newIds.has(l.id) ? '<span class="new-tag">NEW</span>' : ''}
      <div class="row-top">
        <span class="area-name">${l.area}</span>
        <span class="queue-badge">${qd}</span>
      </div>
      <div class="details">${l.type ? l.type + ' · ' : ''}${l.size_sqm ? l.size_sqm + ' m² · ' : ''}${l.rent_sek ? l.rent_sek.toLocaleString() + ' kr/mo · ' : ''}${commute}</div>
    </div>
  `;
}

function handleRowClick(id){
  const l = currentData.listings.find(x => x.id === id);
  if (!l) return;
  if (l.url) { window.open(l.url, '_blank'); return; }
  if (selectedArea) return;
  if (browseAll) { browseAll = false; document.getElementById('browseAllBtn').classList.remove('active'); }
  selectArea(l.area);
}

function toggleBrowseAll(){
  browseAll = !browseAll;
  document.getElementById('browseAllBtn').classList.toggle('active', browseAll);
  if (browseAll) {
    selectedArea = null;
    if (routeLine) { leafletMap.removeLayer(routeLine); routeLine = null; }
  }
  searchQuery = '';
  renderSidebar();
}

function matchesSearch(l, q){
  if (!q) return true;
  const haystack = [l.area, l.type, l.rent_sek, l.size_sqm, l.queue_days, l.raw_text]
    .filter(v => v != null)
    .join(' ')
    .toLowerCase();
  return haystack.includes(q);
}

function renderBrowseList(){
  const list = document.getElementById('listings');
  const newIds = new Set(currentData.new_listing_ids || []);
  const q = searchQuery.trim().toLowerCase();
  let rows = currentData.listings.filter(l => matchesSearch(l, q));
  rows = rows.slice().sort((a,b) => (a.queue_days ?? 1e9) - (b.queue_days ?? 1e9));

  if (rows.length === 0) {
    list.innerHTML = `<div class="empty-state">No listings match "${searchQuery}".</div>`;
    return;
  }
  list.innerHTML = rows.map(l => rowHtml(l, newIds)).join('');
}

function renderSidebar(){
  const header = document.getElementById('panelHeader');
  const list = document.getElementById('listings');
  const newIds = new Set(currentData.new_listing_ids || []);

  if (browseAll) {
    header.innerHTML = `
      <button class="back" onclick="toggleBrowseAll()">← Back to map view</button>
      <h2 id="panelTitle">All listings <span style="color:var(--paper-dim);font-weight:400;font-size:12px;">· ${currentData.listings.length} total</span></h2>
      <input type="text" id="searchInput" class="search-input" placeholder="Search area, rent, size, queue days…">
    `;
    const input = document.getElementById('searchInput');
    input.value = searchQuery;
    input.addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderBrowseList();
    });
    input.focus();
    renderBrowseList();
    return;
  }

  let rows;
  if (selectedArea) {
    const area = currentData.areas[selectedArea];
    header.innerHTML = `
      <button class="back" onclick="clearSelection()">← All listings</button>
      <h2 id="panelTitle">${selectedArea} <span style="color:var(--paper-dim);font-weight:400;font-size:12px;">· ${area.group} line</span></h2>
      <div class="stats-row">${fmtCommute(area)}</div>
    `;
    rows = currentData.listings.filter(l => l.area === selectedArea);
  } else {
    header.innerHTML = `<h2 id="panelTitle">All available listings</h2><div style="font-family:var(--mono);font-size:10.5px;color:var(--paper-dim);margin-top:4px;">within ${maxCommuteMin} min · sorted by queue days</div>`;
    const visible = new Set(visibleAreaNames());
    rows = currentData.listings.filter(l => visible.has(l.area));
  }

  rows = rows.slice().sort((a,b) => (a.queue_days ?? 1e9) - (b.queue_days ?? 1e9));

  if (rows.length === 0) {
    list.innerHTML = `<div class="empty-state">No available listings here right now.<br>SSSB publishes new units a couple of times a week — leave the local script running and it'll notify you when one shows up.</div>`;
    return;
  }

  list.innerHTML = rows.map(l => rowHtml(l, newIds)).join('');
}

// ---- controls ----
document.getElementById('maxCommute').addEventListener('input', (e) => {
  maxCommuteMin = Number(e.target.value);
  document.getElementById('maxCommuteLabel').textContent = maxCommuteMin + ' min';
  render();
});

document.getElementById('legend').addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  const g = btn.dataset.g;
  if (activeGroups.has(g)) { activeGroups.delete(g); btn.classList.add('off'); }
  else { activeGroups.add(g); btn.classList.remove('off'); }
  render();
});

document.getElementById('refreshBtn').addEventListener('click', () => loadData(true));
document.getElementById('browseAllBtn').addEventListener('click', toggleBrowseAll);

initMap();
loadData(false);

// Pick up whatever the background --serve auto-check produces, without
// needing a manual click or page reload. This just reads the cached
// /api/listings (cheap) — it does NOT trigger a new scrape itself.
setInterval(() => loadData(false), 60000);
</script>
</body>
</html>
